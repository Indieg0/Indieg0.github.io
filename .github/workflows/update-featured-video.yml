name: Update featured video

# Keeps the featured video on the landing page pointed at the newest upload
# longer than 3 minutes. Runs on a schedule and can be triggered manually.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-featured-video
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pick latest long-form video
        run: python3 scripts/pick_video.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Update featured video (latest > 3 min)"
            git push
          else
            echo "No change to featured video."
          fi
