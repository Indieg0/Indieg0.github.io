name: Update site content

# Keeps the landing page fresh on a schedule:
#   * featured video -> newest upload longer than 3 minutes
#   * cover / preview images -> latest from App Store, Gumroad, GitHub
#
# Video durations come from the YouTube Data API (YOUTUBE_API_KEY secret): from
# GitHub's datacenter IPs anonymous YouTube requests hit "Sign in to confirm
# you're not a bot". The image sources have no such gate. Each script fails
# loudly if it can resolve nothing, and the page stays fully static.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-site-content
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pick latest long-form video
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 scripts/pick_video.py

      - name: Refresh cover / preview images
        run: python3 scripts/refresh_assets.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html assets)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html assets
            git commit -m "Update site content (featured video + covers)"
            git push
          else
            echo "No content changes."
          fi
